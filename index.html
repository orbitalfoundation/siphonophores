<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Siphonophores — a parametric colony</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🪼</text></svg>" />
  <link rel="stylesheet" href="/node_modules/lil-gui/dist/lil-gui.css" />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #01030a; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    #title {
      position: fixed; left: 18px; top: 16px; z-index: 5;
      font: 500 13px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #8aa6c4; text-shadow: 0 1px 3px rgba(0,0,0,.7); pointer-events: none;
      letter-spacing: .02em;
    }
    #title b { color: #eaf2f8; font-weight: 600; font-size: 15px; }
    #title span { color: #56708a; }

    #hud {
      position: fixed; left: 18px; bottom: 14px; z-index: 5;
      font: 400 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #56708a; text-shadow: 0 1px 2px rgba(0,0,0,.8); pointer-events: none;
      white-space: pre;
    }
    .lil-gui { --width: 300px; --font-size: 11.5px; }

    .species-chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 7px 8px 8px; }
    .species-chips .chip {
      flex: 1 1 auto; padding: 6px 8px; border: 1px solid rgba(255,255,255,.12);
      border-radius: 7px; background: rgba(255,255,255,.045); color: #b9c9d6;
      font: 600 11px ui-sans-serif, system-ui, sans-serif; cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .species-chips .chip:hover { background: rgba(255,255,255,.1); color: #eaf2f8; }
    .species-chips .chip.active {
      background: #2a5f8c; color: #fff; border-color: #6fb2d2;
      box-shadow: 0 0 0 1px rgba(111,178,210,.4);
    }

    #gui-panel {
      position: fixed !important;
      top: auto !important; right: auto !important;
      left: 12px !important; bottom: 46px !important;
      width: 340px !important; max-width: calc(100vw - 24px) !important;
      max-height: 72vh; overflow-y: auto;
      transform: translateY(calc(100% + 60px));
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      border-radius: 12px 12px 0 0;
      box-shadow: 0 -10px 34px rgba(0,0,0,.6);
      z-index: 20;
    }
    body.panel-open #gui-panel { transform: translateY(0); }
    #gui-panel > .title { display: none !important; }

    #panel-tab {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: fixed; left: 12px; bottom: 12px; z-index: 21;
      width: 340px; max-width: calc(100vw - 24px);
      padding: 10px 18px; border: none; border-radius: 10px;
      background: rgba(10,20,34,.94); color: #cfe0ec;
      font: 600 13px ui-sans-serif, system-ui, sans-serif; letter-spacing: .02em;
      box-shadow: 0 4px 16px rgba(0,0,0,.5); backdrop-filter: blur(8px);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #panel-tab::after { content: '▲'; font-size: 10px; opacity: .8; }
    body.panel-open #panel-tab::after { content: '▼'; }

    @media (max-width: 560px), (pointer: coarse) {
      #gui-panel { left: 0 !important; right: 0 !important; width: 100% !important; max-width: 100% !important; border-radius: 14px 14px 0 0; }
      #panel-tab { left: 0; right: 0; width: 100%; border-radius: 0; }
      #title { font-size: 12px; }
      .species-chips .chip { padding: 11px 8px; font-size: 13px; flex: 1 0 calc(33.333% - 5px); }
    }
    #loader {
      position: fixed; inset: 0; z-index: 10; display: grid; place-items: center;
      background: #01030a; color: #6f87aa; transition: opacity .6s;
      font: 400 13px ui-sans-serif, system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="title"><b>🪼 Siphonophores</b> &nbsp;<span id="species-name">Nanomia bijuga</span><br /><span id="mode-line">a parametric colony</span></div>
  <div id="hud"></div>
  <button id="panel-tab" aria-label="toggle controls">🎛 controls</button>
  <div id="loader">descending into the black…</div>

  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/addons/": "/node_modules/three/examples/jsm/",
      "lil-gui": "/node_modules/lil-gui/dist/lil-gui.esm.js"
    }
  }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
